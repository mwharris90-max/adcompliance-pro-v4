<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;family=DM+Sans:wght@400&amp;display=swap');
      @keyframes sweep {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes ping {
        0%   { r: 3.5; opacity: 0.9; }
        70%  { r: 8;   opacity: 0; }
        100% { r: 3.5; opacity: 0; }
      }
      .sweep-arm { transform-origin: 32px 32px; animation: sweep 4s linear infinite; }
      .ping1 { animation: ping 3s ease-out 0.4s infinite; }
      .ping2 { animation: ping 3s ease-out 1.4s infinite; }
      .ping3 { animation: ping 3s ease-out 2.2s infinite; }
    </style>
    <linearGradient id="t_arm" x1="32" y1="32" x2="32" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="t_fan" x1="32" y1="4" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Radar rings -->
  <circle cx="32" cy="32" r="26" stroke="#0e9488" stroke-width="0.7" stroke-opacity="0.22" fill="none"/>
  <circle cx="32" cy="32" r="18" stroke="#0e9488" stroke-width="0.8" stroke-opacity="0.3"  fill="none"/>
  <circle cx="32" cy="32" r="10" stroke="#0e9488" stroke-width="0.9" stroke-opacity="0.42" fill="none"/>
  <line x1="32" y1="6"  x2="32" y2="58" stroke="#0e9488" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="6"  y1="32" x2="58" y2="32" stroke="#0e9488" stroke-width="0.5" stroke-opacity="0.12"/>
  <g class="sweep-arm">
    <line x1="32" y1="32" x2="32" y2="6" stroke="url(#t_arm)" stroke-width="1.6" stroke-linecap="round"/>
    <polygon points="32,32 26.5,6 37.5,6" fill="url(#t_fan)" opacity="0.22"/>
  </g>
  <!-- Blips -->
  <circle cx="44" cy="20" r="2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="44" cy="20" r="3.5" fill="#2dd4bf" class="ping1" opacity="0"/>
  <circle cx="22" cy="44" r="1.8" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="22" cy="44" r="1.8" fill="#2dd4bf" class="ping2" opacity="0"/>
  <circle cx="46" cy="42" r="1.5" fill="#2dd4bf" opacity="0.5"/>
  <circle cx="46" cy="42" r="1.5" fill="#2dd4bf" class="ping3" opacity="0"/>
  <!-- Center -->
  <circle cx="32" cy="32" r="5"   fill="#0d9488" opacity="0.12"/>
  <circle cx="32" cy="32" r="2.5" fill="#2dd4bf" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="76" y="36" font-family="Syne, sans-serif" font-weight="700" font-size="26" letter-spacing="-0.5" fill="#e8faf8">Augur</text>
  <!-- Tagline -->
  <text x="77" y="50" font-family="DM Sans, sans-serif" font-weight="400" font-size="8.5" letter-spacing="1.8" fill="#0e9488">AD COMPLIANCE</text>
</svg>
