<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Compliance Pro</title>
  <link rel="stylesheet" href="src/popup.css" />
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="login-header">
        <img src="icons/icon-48.png" alt="Logo" class="logo" />
        <h1>Ad Compliance <span class="accent">Pro</span></h1>
        <p class="subtitle">by AUX</p>
      </div>
      <form id="login-form" class="form">
        <div class="field">
          <label for="login">Username or Email</label>
          <input type="text" id="login" placeholder="username or email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <div id="login-error" class="error" hidden></div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">Sign In</button>
      </form>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen" hidden>
      <div class="loading-container">
        <div class="spinner"></div>
        <p class="loading-text">Loading...</p>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen" hidden>
      <!-- Top Bar -->
      <div class="topbar">
        <div class="topbar-left">
          <img src="icons/icon-48.png" alt="Logo" class="logo-xs" />
          <span class="topbar-title">ACP <span class="accent">Pro</span></span>
        </div>
        <div class="topbar-right">
          <span id="credit-balance" class="badge"></span>
          <button id="settings-toggle" class="icon-btn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg>
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="check">New Check</button>
        <button class="tab" data-tab="history">History</button>
      </div>

      <!-- Tab: Check -->
      <div id="tab-check" class="tab-content">
        <form id="check-form" class="form">
          <div class="field">
            <label for="headline">Headline</label>
            <input type="text" id="headline" placeholder="Ad headline..." />
          </div>
          <div class="field">
            <label for="body-text">Body / Primary Text</label>
            <textarea id="body-text" rows="3" placeholder="Ad body text..."></textarea>
          </div>
          <div class="field">
            <label for="cta">Call to Action</label>
            <input type="text" id="cta" placeholder="e.g. Shop Now, Learn More..." />
          </div>
          <div class="field-row">
            <div class="field">
              <label for="platform-select">Platform</label>
              <select id="platform-select" required>
                <option value="">Select...</option>
              </select>
            </div>
            <div class="field">
              <label for="country-select">Country</label>
              <select id="country-select" required>
                <option value="">Select...</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="category-select">Category (optional)</label>
            <select id="category-select">
              <option value="">None</option>
            </select>
          </div>
          <div id="check-error" class="error" hidden></div>
          <button type="submit" id="check-btn" class="btn btn-primary btn-full">
            <span class="btn-text">Run Compliance Check</span>
            <span class="btn-loading" hidden>
              <span class="spinner-sm"></span> Checking...
            </span>
          </button>
        </form>

        <!-- Results -->
        <div id="results-section" hidden>
          <div class="divider"></div>
          <div id="results-header" class="results-header">
            <span id="results-status" class="status-badge"></span>
            <a id="results-link" href="#" target="_blank" class="view-link">View Full Report &rarr;</a>
          </div>
          <p id="results-summary" class="results-summary"></p>
          <div id="issues-list" class="issues-list"></div>
        </div>
      </div>

      <!-- Tab: History -->
      <div id="tab-history" class="tab-content" hidden>
        <div id="history-loading" class="loading-container-sm">
          <div class="spinner-sm"></div>
        </div>
        <div id="history-empty" hidden>
          <p class="empty-text">No checks yet. Run your first compliance check!</p>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>

      <!-- Settings Panel (overlay) -->
      <div id="settings-panel" class="settings-panel" hidden>
        <div class="settings-header">
          <h2>Settings</h2>
          <button id="settings-close" class="icon-btn">&times;</button>
        </div>
        <div class="settings-body">
          <div class="settings-section">
            <label class="settings-label">API Environment</label>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="api-env" value="development" />
                <span>Development (localhost:3000)</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="api-env" value="production" />
                <span>Production (Vercel)</span>
              </label>
            </div>
          </div>
          <div class="settings-section">
            <label class="settings-label">Account</label>
            <div id="settings-user" class="settings-user-info"></div>
          </div>
          <div class="divider"></div>
          <button id="logout-btn" class="btn btn-danger btn-full">Sign Out</button>
        </div>
      </div>
    </div>
  </div>

  <script src="src/popup.js" type="module"></script>
</body>
</html>
